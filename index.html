<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Finance Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-gray-100 p-4">

  <!-- Header -->
  <div class="flex flex-wrap justify-between items-center gap-2 mb-6">
    <h1 class="text-2xl font-bold">Finance Dashboard</h1>

    <div class="flex gap-2 flex-wrap">
      <select id="roleSwitcher" class="p-2 border rounded">
        <option value="viewer">Viewer</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="toggleDark()" class="px-3 py-2 bg-black text-white rounded">🌙</button>

      <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded">
        Export
      </button>
    </div>
  </div>

  <!-- Summary -->
  <div id="summary" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

  <!-- Charts -->
  <div class="grid md:grid-cols-2 gap-4 mt-6">
    <canvas id="lineChart"></canvas>
    <canvas id="pieChart"></canvas>
  </div>

  <canvas id="monthlyChart" class="mt-6"></canvas>

  <!-- Admin -->
  <div id="adminSection" class="mt-6 hidden">
    <h2 class="font-semibold mb-2">Add Transaction</h2>
    <div class="flex gap-2 flex-wrap">
      <input id="amount" type="number" placeholder="Amount" class="p-2 border rounded"/>
      <input id="category" placeholder="Category" class="p-2 border rounded"/>
      <select id="type" class="p-2 border rounded">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <button onclick="addTransaction()" class="bg-blue-500 text-white px-4 py-2 rounded">Add</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-2 mt-6">
    <input id="search" placeholder="Search..." class="p-2 border rounded"/>
    <input type="date" id="dateFilter" class="p-2 border rounded"/>
    <select id="sort" class="p-2 border rounded">
      <option value="">Sort</option>
      <option value="amount">Amount</option>
      <option value="date">Date</option>
    </select>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto mt-4">
    <table class="w-full bg-white rounded shadow">
      <thead>
        <tr class="bg-gray-200">
          <th class="p-2">Date</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Type</th>
          <th id="actionHeader">Action</th>
        </tr>
      </thead>
      <tbody id="transactionTable"></tbody>
    </table>
  </div>

  <!-- Insights -->
  <div id="insights" class="mt-6 bg-white p-4 rounded shadow"></div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded hidden"></div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
